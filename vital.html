<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステータス更新 - ろぎてむ</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a202c; padding: 15px; color: #fff; margin: 0; scroll-behavior: smooth; }
        .form-card { background: #2d3748; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid #4a5568; }
        h2 { text-align: center; color: #ed64a6; font-size: 22px; margin-bottom: 25px; letter-spacing: 2px; }
        h3 { border-left: 4px solid #ed64a6; padding-left: 12px; font-size: 14px; margin: 25px 0 15px; color: #cbd5e0; background: rgba(0,0,0,0.2); padding-top: 5px; padding-bottom: 5px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 6px; font-weight: bold; color: #a0aec0; }
        input, textarea { width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; border-radius: 12px; box-sizing: border-box; font-size: 16px; color: #fff; -webkit-appearance: none; }
        input:focus { border-color: #ed64a6; outline: none; }
        
        .btn-submit { width: 100%; background: linear-gradient(135deg, #ed64a6 0%, #764ba2 100%); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: bold; margin-top: 20px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-submit.completed { background: #4a5568 !important; }

        #after-submit { display: none; text-align: center; margin-top: 25px; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.3); border: 2px solid #06C755; box-sizing: border-box; animation: fadeInUp 0.8s ease-out forwards; }
        .line-btn { display: block; width: 100%; padding: 16px 0; background-color: #06C755; color: white; text-decoration: none; border-radius: 16px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3); }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .spacer { height: 50px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>⚖️ ステータス更新</h2>
        
        <h3>【体組成】</h3>
        <div class="input-group"><label>体重 (kg)</label><input type="number" id="weight" step="0.1" placeholder="65.2"></div>
        <div class="input-group"><label>体脂肪率 (%)</label><input type="number" id="fat_pc" step="0.1" placeholder="18.5"></div>
        <div class="input-group"><label>筋肉量 (kg)</label><input type="number" id="muscle" step="0.1" placeholder="50.1"></div>

        <h3>【身体データ】</h3>
        <div class="input-group"><label>歩数 (探索距離)</label><input type="number" id="steps" placeholder="8000"></div>
        <div class="input-group"><label>運動・冒険記録</label><textarea id="exercise" rows="2" placeholder="散歩30分 など"></textarea></div>

        <button class="btn-submit" id="submit-btn" onclick="submitVital()">記録を送信する</button>

        <div id="after-submit">
            <p style="font-weight: bold; color: #48bb78; margin: 0;">✅ ギルドへ報告完了！</p>
            <p style="font-size: 13px; color: #a0aec0; margin: 5px 0 0;">LINEで報酬（EXP）を確認しよう。</p>
            <a href="https://lin.ee/p7TWbCo" class="line-btn">LINEへ戻る</a>
        </div>
        <div class="spacer"></div>
    </div>

    <script>
        const RPG_GAS_URL = "AKfycbwSVPNQZ60INpvWiKWnDjyx_78sclB1LF1rco0U0X0p-04hDnDXU7sphUqPxAczqtdm";

        liff.init({ liffId: "2009859584-THwDZKBN" }).then(() => {
            if (!liff.isLoggedIn()) { liff.login(); }
        });

        async function submitVital() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            const profile = await liff.getProfile();
            const data = {
                type: "vital_record",
                userId: profile.userId,
                weight: document.getElementById('weight').value,
                steps: document.getElementById('steps').value,
                exercise: document.getElementById('exercise').value
            };

            await fetch(RPG_GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });

            btn.classList.add('completed');
            btn.innerText = "報告完了！";
            document.getElementById('after-submit').style.display = 'block';
            setTimeout(() => {
                document.getElementById('after-submit').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 400);
        }
    </script>
</body>
</html>
