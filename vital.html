<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステータス更新 - ろぎてむ</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a202c; padding: 15px; color: #fff; margin: 0; }
        .form-card { background: #2d3748; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid #4a5568; }
        h2 { text-align: center; color: #ed64a6; font-size: 22px; margin-bottom: 25px; letter-spacing: 2px; }
        h3 { border-left: 4px solid #ed64a6; padding-left: 12px; font-size: 14px; margin: 25px 0 15px; color: #cbd5e0; background: rgba(0,0,0,0.2); padding: 5px 12px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 6px; font-weight: bold; color: #a0aec0; }
        input, textarea { width: 100%; padding: 12px; background: #1a202c; border: 1px solid #4a5568; border-radius: 12px; box-sizing: border-box; font-size: 16px; color: #fff; outline: none; }
        input:focus { border-color: #ed64a6; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #ed64a6 0%, #764ba2 100%); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: bold; margin-top: 20px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(237,100,166,0.3); }
        .btn-submit:disabled { background: #4a5568; cursor: not-allowed; }
        #after-submit { display: none; text-align: center; margin-top: 25px; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.3); border: 2px solid #06C755; }
        .line-btn { display: block; width: 100%; padding: 16px 0; background-color: #06C755; color: white; text-decoration: none; border-radius: 16px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>⚖️ ステータス更新</h2>
        
        <h3>【体組成】</h3>
        <div class="input-group">
            <label>体重 (kg)</label>
            <input type="number" id="weight" step="0.1" placeholder="65.0">
        </div>
        <div class="input-group">
            <label>体脂肪率 (%)</label>
            <input type="number" id="fat_pc" step="0.1" placeholder="18.0">
        </div>

        <h3>【身体データ】</h3>
        <div class="input-group">
            <label>歩数 (探索距離)</label>
            <input type="number" id="steps" placeholder="8000">
        </div>
        <div class="input-group">
            <label>冒険記録 (メモ)</label>
            <textarea id="exercise" rows="2" placeholder="筋トレ 30分 など"></textarea>
        </div>

        <button class="btn-submit" id="submit-btn" onclick="submitVital()">記録を送信して探索完了</button>

        <div id="after-submit">
            <p style="font-weight: bold; color: #48bb78;">✅ ギルドへの報告が完了しました！</p>
            <p style="font-size: 13px; color: #a0aec0;">経験値が加算されました。</p>
            <a href="https://line.me/R/ti/p/@your_id" id="line-link" class="line-btn">LINEへ戻る</a>
        </div>
    </div>

    <script>
        const RPG_GAS_URL = "https://script.google.com/macros/s/AKfycbwSVPNQZ60INpvWiKWnDjyx_78sclB1LF1rco0U0X0p-04hDnDXU7sphUqPxAczqtdm/exec";
        const LIFF_ID = "2009859584-THwDZKBN";

        window.onload = async () => {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); }
        };

        async function submitVital() {
            const weight = document.getElementById('weight').value;
            if(!weight) { alert("体重を入力してください"); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                const profile = await liff.getProfile();
                const data = {
                    type: "vital_record",
                    userId: profile.userId,
                    weight: weight,
                    fat_pc: document.getElementById('fat_pc').value,
                    steps: document.getElementById('steps').value,
                    exercise: document.getElementById('exercise').value,
                    name: "身体測定"
                };

                await fetch(RPG_GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });

                document.getElementById('after-submit').style.display = 'block';
                btn.style.display = 'none';
            } catch (e) {
                console.error(e);
                alert("送信に失敗しました。再度お試しください。");
                btn.disabled = false;
                btn.innerText = "記録を送信して探索完了";
            }
        }
    </script>
</body>
</html>
