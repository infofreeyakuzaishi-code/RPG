<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ろぎてむ・クエスト</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* スタイルは先ほど提示した「かっこいいデザイン」を全維持 */
        body { font-family: sans-serif; background-color: #1a202c; margin: 0; padding: 20px 0; color: #fff; }
        .card { background: #2d3748; width: 92%; max-width: 420px; margin: auto; border-radius: 28px; border: 2px solid #4a5568; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #44337a 0%, #764ba2 100%); padding: 30px 20px; text-align: center; }
        .status-box { background: rgba(0,0,0,0.3); margin: 20px; padding: 18px; border-radius: 20px; }
        .level-badge { background: #ed64a6; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .exp-bar { background: linear-gradient(90deg, #4fd1c5, #63b3ed); height: 100%; width: 0%; transition: width 1s; }
        .exp-container { background: #1a202c; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .label-group { font-size: 12px; color: #a0aec0; margin: 20px; font-weight: bold; }
        .potion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .potion-item { background: #3d4957; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; }
        .stamp-grid { display: flex; justify-content: space-around; padding: 0 20px; gap: 10px; }
        .stamp-btn { background: #3d4957; border: none; border-radius: 15px; flex: 1; padding: 15px; font-size: 24px; color: white; }
        .quest-btn { width: calc(100% - 40px); margin: 20px; padding: 18px; border-radius: 18px; border: none; background: #ed64a6; color: white; font-weight: bold; }
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a202c; z-index:100; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>
<div id="loading">読み込み中...</div>
<div class="card">
    <div class="header"><h1>ROGITEM QUEST</h1></div>
    <div class="status-box">
        <div style="display:flex; justify-content:space-between;">
            <span id="user-title">...</span>
            <span class="level-badge">Lv.<span id="user-level">-</span></span>
        </div>
        <div class="exp-container"><div id="exp-bar" class="exp-bar"></div></div>
    </div>
    <div class="label-group">今の気分</div>
    <div class="stamp-grid">
        <button class="stamp-btn" onclick="sendAction('stamp', '😊')">😊</button>
        <button class="stamp-btn" onclick="sendAction('stamp', '😑')">😑</button>
        <button class="stamp-btn" onclick="sendAction('stamp', '😫')">😫</button>
    </div>
    <div class="label-group">ポーション</div>
    <div id="potion-grid" class="potion-grid"></div>
    <button class="quest-btn" onclick="location.href='vital.html'+window.location.search">⚔️ 身体データ入力</button>
</div>

<script>
    const RPG_GAS_URL = "https://script.google.com/macros/s/AKfycbwSVPNQZ60INpvWiKWnDjyx_78sclB1LF1rco0U0X0p-04hDnDXU7sphUqPxAczqtdm/exec";
    const LIFF_ID = "2009859584-THwDZKBN";

    window.onload = async () => {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        const item = new URLSearchParams(window.location.search).get('item') || "default";

        const res = await fetch(`${RPG_GAS_URL}?type=getStatus&userId=${profile.userId}&item=${item}`);
        const data = await res.json();

        document.getElementById('user-level').innerText = data.lv;
        document.getElementById('user-title').innerText = data.title;
        document.getElementById('exp-bar').style.width = (data.totalExp % 100) + "%";

        const grid = document.getElementById('potion-grid');
        data.buttons.forEach(btn => {
            const div = document.createElement('div');
            div.className = 'potion-item';
            div.onclick = () => sendAction('supply', btn.name);
            div.innerHTML = `<div>🧪</div><div style="font-size:12px;">${btn.name}</div>`;
            grid.appendChild(div);
        });
        document.getElementById('loading').style.display = 'none';
    };

    async function sendAction(type, name) {
        const profile = await liff.getProfile();
        // GASへ送信
        await fetch(RPG_GAS_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ type: type, userId: profile.userId, displayName: profile.displayName, name: name })
        });
        // LINE送信
        if (liff.isInClient()) {
            await liff.sendMessages([{ type: 'text', text: `【クエスト記録】\n${name} を使用しました！` }]);
        }
        alert(name + " を記録しました！");
        liff.closeWindow();
    }
</script>
</body>
</html>
